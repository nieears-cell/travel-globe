<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>创建我的旅行地球</title>
<meta property="og:title" content="创建我的旅行地球">
<meta property="og:description" content="勾选去过的城市,30 秒生成专属的复古航海图 3D 地球。">
<meta property="og:type" content="website">
<meta property="og:image" content="https://nieears-cell.github.io/travel-globe/assets/hero-vintage.jpg">
<meta name="description" content="勾选去过的城市,30 秒生成专属的复古航海图 3D 地球。">
<style>
  :root{ --bg:#14110c; --card:#1d180f; --line:#4a3c28; --ink:#f3ead4; --gold:#e0c98a; --gold2:#c4964c; --mut:#9c8e6e; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #241c10 0%, var(--bg) 60%); color:var(--ink);
    min-height:100vh; padding:24px 18px calc(120px + env(safe-area-inset-bottom,0px)); max-width:600px; margin:0 auto; }
  h1{ font-size:30px; font-weight:700; margin:8px 0 6px; letter-spacing:.5px;
    background:linear-gradient(180deg,#f6ecc9,#c79a4f); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sub{ color:var(--mut); font-size:14px; line-height:1.6; margin-bottom:22px; }
  h2{ font-size:15px; font-weight:600; color:var(--gold); margin:24px 0 10px; display:flex; align-items:center; gap:8px; }
  h2 .n{ color:var(--mut); font-weight:400; font-size:13px; }
  .search{ width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:16px; outline:none; }
  .search:focus{ border-color:var(--gold2); }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
  .chip{ padding:9px 14px; border-radius:999px; border:1px solid var(--line); background:var(--card);
    color:#cdbf9d; cursor:pointer; font-size:14px; line-height:1; min-height:38px; display:inline-flex; align-items:center; gap:6px; transition:.12s; }
  .chip:active{ transform:scale(.96); }
  .chip.on{ background:var(--gold2); color:#1a140a; border-color:var(--gold2); font-weight:600; }
  .chip.add{ border-style:dashed; color:var(--gold); }
  .chip.wish{ border-style:dashed; border-color:var(--gold2); color:var(--gold); background:rgba(196,150,76,.08); }
  .chip .x{ opacity:.7; font-weight:700; }
  .selbar{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-top:4px; }
  .selbar .empty{ color:var(--mut); font-size:14px; }
  .homepick{ display:flex; flex-wrap:wrap; gap:8px; }
  .home{ padding:9px 14px; border-radius:999px; border:1px solid var(--line); background:var(--card);
    color:#cdbf9d; cursor:pointer; font-size:14px; min-height:38px; display:inline-flex; align-items:center; }
  .home.on{ background:rgba(196,150,76,.18); border-color:var(--gold2); color:var(--gold); font-weight:600; }
  .styles{ display:flex; gap:10px; }
  .style{ flex:1; padding:0; border-radius:14px; border:1px solid var(--line); overflow:hidden;
    color:#cdbf9d; cursor:pointer; text-align:center; font-size:15px; transition:.12s; background:var(--card); }
  .style.on{ border-color:var(--gold2); color:var(--ink); box-shadow:0 0 0 1px var(--gold2) inset; }
  .style .swatch{ height:56px; position:relative; }
  .style[data-theme="vintage"] .swatch{ background:
    radial-gradient(140% 110% at 50% 120%, #b98d4f 0%, #8a6234 44%, #3a2b18 78%, #191209 100%); }
  .style[data-theme="vintage"] .swatch::after{ content:'✦'; position:absolute; right:10px; top:8px; color:rgba(240,225,185,.85); font-size:13px; }
  .style[data-theme="night"] .swatch{ background:
    radial-gradient(130% 120% at 50% 125%, #1c4d8f 0%, #0d2a55 46%, #051228 76%, #01050e 100%); }
  .style[data-theme="night"] .swatch::after{ content:'☾'; position:absolute; right:10px; top:6px; color:rgba(150,215,255,.9); font-size:14px; }
  .style .lbl{ padding:11px 12px 13px; }
  .style small{ display:block; color:var(--mut); font-size:12px; margin-top:4px; }
  .gobar{ position:fixed; left:0; right:0; bottom:0; padding:14px 18px calc(14px + env(safe-area-inset-bottom,0px));
    background:linear-gradient(0deg, var(--bg) 70%, transparent); max-width:600px; margin:0 auto; }
  .go{ width:100%; padding:16px; border-radius:14px; border:0; font-size:17px; font-weight:700; cursor:pointer;
    background:linear-gradient(180deg,#e8be6f,#c4964c); color:#1a140a; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .go:disabled{ filter:grayscale(.7) brightness(.7); cursor:not-allowed; box-shadow:none; }
  .hint{ text-align:center; color:var(--mut); font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<h1>我的旅行地球</h1>
<div class="sub">钉下你去过的城市，生成一张只属于你的旅行版图 —— 可以保存、发出去。</div>

<h2>① 选择城市:点一下=去过,再点=想去 <span class="n" id="selcount"></span></h2>
<div class="selbar" id="selbar"><span class="empty">还没选 · 在下面点选或搜索</span></div>
<input class="search" id="search" placeholder="🔍 搜城市（中文名，国内外都行）" autocomplete="off">
<div class="chips" id="chips"></div>

<h2>② 哪座是你的「本命城市」 <span class="n">航线与高亮从这里出发</span></h2>
<div class="homepick" id="homepick"><span class="empty" style="color:var(--mut);font-size:14px;">先选城市</span></div>

<h2>③ 选个风格</h2>
<div class="styles">
  <div class="style on" data-theme="vintage"><div class="swatch"></div><div class="lbl">复古航海图<small>羊皮纸 · 古星图 · 帆船</small></div></div>
  <div class="style" data-theme="night"><div class="swatch"></div><div class="lbl">写实夜景<small>真实晨昏线 · 城市灯</small></div></div>
</div>

<div class="gobar">
  <button class="go" id="go" disabled>生成我的旅行地球 →</button>
  <div class="hint" id="hint">至少选 1 座城市</div>
</div>

<script>
var COORDS = {}, NAMES = [], selected = [], wish = [], homeCity = null, theme = 'vintage';
var POPULAR = ['上海','北京','成都','重庆','西安','杭州','广州','深圳','南京','厦门','长沙','青岛','大理','丽江','三亚','拉萨','苏州','武汉','香港','台北',
  '东京','大阪','京都','首尔','曼谷','清迈','新加坡','巴厘岛','吉隆坡','迪拜','巴黎','伦敦','罗马','巴塞罗那','阿姆斯特丹','纽约','洛杉矶','旧金山','悉尼','墨尔本'];

fetch('persona-core/city_coords.json').then(function(r){ return r.json(); }).then(function(j){
  COORDS = j; NAMES = Object.keys(j);
  // 预载优先级:URL ?cities=(分享链接/换设备,localStorage 可能为空)→ localStorage(老用户回访)
  try {
    var qs = new URLSearchParams(location.search);
    var q = qs.get('cities');
    var prev = q ? q.split(',').map(function(s){ return s.trim(); }).filter(Boolean)
                 : JSON.parse(localStorage.getItem('myGlobeCities') || '[]');
    var prevW = q ? (qs.get('wish') || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean)
                  : JSON.parse(localStorage.getItem('myGlobeWish') || '[]');
    if (prev && prev.length){ selected = prev.slice(); homeCity = prev[0]; }
    if (prevW && prevW.length){ wish = prevW.filter(function(n){ return selected.indexOf(n) < 0; }); }
  } catch(e){}
  renderChips(''); renderSel(); renderHome(); updateGo();
});

function renderChips(filter){
  var box = document.getElementById('chips'); box.innerHTML = '';
  var f = (filter||'').trim();
  var list;
  if (f) list = NAMES.filter(function(n){ return n.indexOf(f) >= 0; }).slice(0, 60);
  else list = POPULAR.filter(function(n){ return COORDS[n]; });
  list.forEach(function(n){
    var el = document.createElement('span');
    el.className = 'chip' + (selected.indexOf(n) >= 0 ? ' on' : (wish.indexOf(n) >= 0 ? ' wish' : ''));
    el.textContent = (wish.indexOf(n) >= 0 ? '☆ ' : '') + n;
    el.onclick = function(){ toggle(n); };
    box.appendChild(el);
  });
  // 自定义兜底:搜不到也能加(globe 端有坐标才会显示)
  if (f && !COORDS[f] && selected.indexOf(f) < 0){
    var add = document.createElement('span');
    add.className = 'chip add';
    add.textContent = '＋ 添加「' + f + '」';
    add.onclick = function(){ toggle(f); document.getElementById('search').value=''; renderChips(''); };
    box.appendChild(add);
  }
}
function toggle(n){
  // 三态循环:未选 → 去过 → 想去 → 移除
  var i = selected.indexOf(n), w = wish.indexOf(n);
  if (i >= 0){
    selected.splice(i, 1); wish.push(n);
    if (homeCity === n) homeCity = selected[0] || null;
  } else if (w >= 0){
    wish.splice(w, 1);
  } else {
    selected.push(n); if (!homeCity) homeCity = n;
  }
  renderChips(document.getElementById('search').value); renderSel(); renderHome(); updateGo();
}
function renderSel(){
  var box = document.getElementById('selbar');
  document.getElementById('selcount').textContent = selected.length ? ('已选 '+selected.length) : '';
  if (!selected.length && !wish.length){ box.innerHTML = '<span class="empty">还没选 · 在下面点选或搜索(点一下=去过,再点=想去)</span>'; return; }
  box.innerHTML = '';
  var wrap = document.createElement('div'); wrap.className = 'chips';
  function chipOf(n, isWish){
    var el = document.createElement('span'); el.className = isWish ? 'chip wish' : 'chip on';
    el.textContent = (isWish ? '☆ ' : '') + n + ' ';           // textContent 防注入(城市名可为任意用户输入)
    var x = document.createElement('span'); x.className = 'x'; x.textContent = '×';
    x.onclick = function(ev){                                   // × 直接移除(跳过三态)
      ev.stopPropagation();
      var arr = isWish ? wish : selected;
      var i = arr.indexOf(n); if (i >= 0) arr.splice(i, 1);
      if (!isWish && homeCity === n) homeCity = selected[0] || null;
      renderChips(document.getElementById('search').value); renderSel(); renderHome(); updateGo();
    };
    el.appendChild(x);
    el.onclick = function(){ toggle(n); };
    wrap.appendChild(el);
  }
  selected.forEach(function(n){ chipOf(n, false); });
  wish.forEach(function(n){ chipOf(n, true); });
  box.appendChild(wrap);
}
function renderHome(){
  var box = document.getElementById('homepick');
  if (!selected.length){ box.innerHTML = '<span class="empty" style="color:var(--mut);font-size:14px;">先选城市</span>'; return; }
  box.innerHTML = '';
  selected.forEach(function(n){
    var el = document.createElement('span'); el.className = 'home' + (homeCity===n ? ' on' : '');
    el.textContent = (homeCity===n ? '★ ' : '') + n;
    el.onclick = function(){ homeCity = n; renderHome(); updateGo(); };
    box.appendChild(el);
  });
}
function updateGo(){
  var go = document.getElementById('go'), hint = document.getElementById('hint');
  go.disabled = selected.length < 1;
  var wtxt = wish.length ? (' · 心愿 ' + wish.length) : '';
  hint.textContent = selected.length < 1 ? '至少选 1 座去过的城市(点一下=去过,再点=想去)'
    : (selected.length < 3 ? ('已选 '+selected.length+' 座'+wtxt+' · 再多选几座地球会更好看') : ('已选 '+selected.length+' 座'+wtxt+' · 本命城市：'+(homeCity||'—')));
}
document.getElementById('search').oninput = function(){ renderChips(this.value); };
document.querySelectorAll('.style').forEach(function(s){
  s.onclick = function(){
    document.querySelectorAll('.style').forEach(function(x){ x.classList.remove('on'); });
    s.classList.add('on'); theme = s.getAttribute('data-theme');
  };
});
document.getElementById('go').onclick = function(){
  if (!selected.length) return;
  // 城市库外的自定义名(地球端无坐标)会被静默跳过——生成前如实告知,别让人疑惑"少了一座城"
  var unknown = selected.concat(wish).filter(function(n){ return !COORDS[n]; });
  if (unknown.length){
    var ok = window.confirm('「' + unknown.join('、') + '」暂不在城市库里,这次不会出现在地球上。\n仍然生成吗?');
    if (!ok) return;
  }
  try {
    localStorage.setItem('myGlobeCities', JSON.stringify(selected));
    localStorage.setItem('myGlobeWish', JSON.stringify(wish));
  } catch(e){}
  var u = 'index.html?cities=' + encodeURIComponent(selected.join(','))
    + (wish.length ? '&wish=' + encodeURIComponent(wish.join(',')) : '')
    + '&home=' + encodeURIComponent(homeCity || selected[0])
    + '&theme=' + theme
    + '&title=' + encodeURIComponent('我的旅行地球');
  location.href = u;
};
</script>
</body>
</html>
